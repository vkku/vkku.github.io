<div class="image-gallery">
  {% assign images = include.images | split: "," %}
  {% for image in images %}
    <div class="gallery-item">
      <img src="{{ image | strip }}" alt="Gallery image" loading="lazy">
    </div>
  {% endfor %}
</div>

<style>
.image-gallery {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.gallery-item {
  flex: 1 1 300px;
  max-width: 300px;
}

.gallery-item img {
  width: 100%;
  height: auto;
  border-radius: 8px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  transition: transform 0.3s ease;
}

.gallery-item img:hover {
  transform: scale(1.05);
}
</style>
